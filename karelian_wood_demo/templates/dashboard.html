<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дашборд аналитики | Карелиан Вуд Кампани</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; padding: 20px; background: #eef2f3; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #1e5631; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { background: #1e5631; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 36px; font-weight: bold; color: #1e5631; }
        .stat-label { color: #666; margin-top: 8px; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-card h3 { margin-top: 0; color: #333; }
        canvas { max-height: 300px; }
        .top-words { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .word-tag { background: #e8f0e8; padding: 6px 12px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="dashboard-header">
        <h1>📊 Дашборд аналитики отзывов</h1>
        <a href="/" class="back-link">← Вернуться на сайт</a>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number" id="total">-</div><div class="stat-label">Всего отзывов</div></div>
        <div class="stat-card"><div class="stat-number" id="approved">-</div><div class="stat-label">Одобрено</div></div>
        <div class="stat-card"><div class="stat-number" id="rejected">-</div><div class="stat-label">Отклонено</div></div>
        <div class="stat-card"><div class="stat-number" id="approvalRate">-</div><div class="stat-label">Одобрение (%)</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>🎭 Тональность отзывов</h3>
            <canvas id="sentimentChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>⚠️ Типы оскорблений</h3>
            <canvas id="abuseChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>📅 Динамика по дням (последние 7 дней)</h3>
            <canvas id="dailyChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>📈 Точность нейросети (по A/B тесту)</h3>
            <canvas id="accuracyChart"></canvas>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">
                🤖 Общая точность модели: <span id="neuralAccuracy">-</span>%
            </p>
        </div>
        <div class="chart-card">
            <h3>🔝 Топ-10 слов</h3>
            <canvas id="wordsChart"></canvas>
        </div>
    </div>

    <div class="chart-card">
        <h3>🏷️ Облако ключевых слов</h3>
        <div id="wordCloud" class="top-words"></div>
    </div>
</div>

<script>
    let sentimentChart, abuseChart, dailyChart, wordsChart, accuracyChart;

    async function loadAccuracyStats() {
        const response = await fetch('/api/accuracy_stats');
        const data = await response.json();
        
        // Обновляем общую точность
        document.getElementById('neuralAccuracy').innerText = data.neural_accuracy;
        
        // График точности по дням
        const dates = data.daily_accuracy.map(d => d.date);
        const accuracies = data.daily_accuracy.map(d => d.accuracy);
        
        if (accuracyChart) accuracyChart.destroy();
        accuracyChart = new Chart(document.getElementById('accuracyChart'), {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Точность (%)',
                    data: accuracies,
                    borderColor: '#1e5631',
                    backgroundColor: 'rgba(30, 86, 49, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                scales: {
                    y: {
                        min: 0,
                        max: 100,
                        title: { display: true, text: 'Точность (%)' }
                    }
                }
            }
        });
    }

    async function loadStats() {
        const response = await fetch('/api/stats');
        const data = await response.json();
        
        document.getElementById('total').innerText = data.total;
        document.getElementById('approved').innerText = data.approved;
        document.getElementById('rejected').innerText = data.rejected;
        document.getElementById('approvalRate').innerText = data.approval_rate + '%';
        
        if (sentimentChart) sentimentChart.destroy();
        sentimentChart = new Chart(document.getElementById('sentimentChart'), {
            type: 'doughnut',
            data: {
                labels: ['POSITIVE', 'NEGATIVE', 'NEUTRAL'],
                datasets: [{
                    data: [data.sentiments.POSITIVE || 0, data.sentiments.NEGATIVE || 0, data.sentiments.NEUTRAL || 0],
                    backgroundColor: ['#2e7d32', '#c62828', '#ff9800']
                }]
            }
        });
        
        if (abuseChart) abuseChart.destroy();
        abuseChart = new Chart(document.getElementById('abuseChart'), {
            type: 'bar',
            data: {
                labels: ['Явные оскорбления', 'Завуалированные'],
                datasets: [{
                    label: 'Количество',
                    data: [data.toxic_count, data.hidden_count],
                    backgroundColor: ['#d32f2f', '#ff9800']
                }]
            }
        });
        
        const dates = Object.keys(data.daily_counts);
        const counts = Object.values(data.daily_counts);
        if (dailyChart) dailyChart.destroy();
        dailyChart = new Chart(document.getElementById('dailyChart'), {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Отзывов',
                    data: counts,
                    borderColor: '#1e5631',
                    fill: false
                }]
            }
        });
        
        const words = data.top_words.map(w => w[0]);
        const wordCounts = data.top_words.map(w => w[1]);
        if (wordsChart) wordsChart.destroy();
        wordsChart = new Chart(document.getElementById('wordsChart'), {
            type: 'bar',
            data: {
                labels: words,
                datasets: [{
                    label: 'Частота',
                    data: wordCounts,
                    backgroundColor: '#1e5631'
                }]
            },
            options: { indexAxis: 'y', responsive: true }
        });
        
        const cloudDiv = document.getElementById('wordCloud');
        cloudDiv.innerHTML = '';
        data.top_words.forEach(w => {
            const span = document.createElement('span');
            span.className = 'word-tag';
            span.innerText = `${w[0]} (${w[1]})`;
            cloudDiv.appendChild(span);
        });
    }
    
    // Загружаем всё при старте
    loadStats();
    loadAccuracyStats();
    
    // Обновляем каждые 30 секунд
    setInterval(() => {
        loadStats();
        loadAccuracyStats();
    }, 30000);
</script>
</body>
</html>
